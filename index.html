<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Calendar & Shopping</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta name="theme-color" content="#002c3a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>

    <div class="app-background"></div>

    <div class="app-container">
        <!-- Sidebar Overlay (for mobile) -->
        <div id="sidebar-overlay" class="sidebar-overlay" onclick="app.ui.toggleSidebar(false)"></div>

        <!-- Sidebar (Shared for Members / Stores) -->
        <aside class="sidebar" id="sidebar">
            <div class="brand"
                style="display: flex; align-items: center; gap: 12px; padding: 0 10px; margin-bottom: 25px; color: white;">
                <i class="fa-solid fa-calendar-check" style="font-size: 1.4rem; opacity: 0.9;"></i>
                <h1 style="font-size: 1.15rem; font-weight: 700; letter-spacing: -0.5px;">Family Calendar</h1>
            </div>
            <div class="sidebar-header">
                <h2 id="sidebar-title">Members</h2>
                <button class="icon-btn" id="sidebar-add-btn" onclick="app.handlers.onAddSidebarItem()">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
            <div id="sidebar-list" class="sidebar-list">
                <!-- Dynamic List Items -->
            </div>
        </aside>

        <!-- Main Workspace Area -->
        <div class="content-wrapper">
            <header class="header">
                <button id="menu-toggle" onclick="app.ui.toggleSidebar(true)">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <nav class="main-nav">
                    <button id="nav-calendar" class="nav-btn active" onclick="app.switchView('calendar')">
                        <i class="fa-solid fa-calendar-days"></i> Calendar
                    </button>
                    <button id="nav-shopping" class="nav-btn" onclick="app.switchView('shopping')">
                        <i class="fa-solid fa-basket-shopping"></i> Shopping
                    </button>
                </nav>

                <div class="header-actions">
                    <button class="icon-btn" onclick="app.ui.openModal('settings')" title="Settings">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                    <button class="icon-btn" onclick="app.auth.logout()" title="Logout" id="btn-logout">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </header>

            <main class="main-view" id="main-view">
                <!-- Dynamic Content (Calendar Grid / Shopping List Items) -->
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay hidden">

        <!-- Add Member Modal -->
        <div id="modal-member" class="modal hidden">
            <h3>New Family Member</h3>
            <form id="form-member">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" required placeholder="e.g. Mom">
                </div>
                <div class="form-group">
                    <label>Color</label>
                    <input type="color" name="color" value="#002c3a">
                </div>
                <div class="form-group">
                    <label>PIN (Optional for Login)</label>
                    <input type="password" name="pin" placeholder="****" maxlength="4">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-text" onclick="app.ui.closeModals()">Cancel</button>
                    <button type="submit" class="btn-primary">Add Member</button>
                </div>
            </form>
        </div>

        <!-- Add Appointment Modal -->
        <div id="modal-appointment" class="modal hidden">
            <h3>New Appointment</h3>
            <form id="form-appointment">
                <input type="hidden" name="id">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" required placeholder="Details...">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Member</label>
                        <select name="memberId" id="appt-member-select" required></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <input type="time" name="time" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Comment (Private)</label>
                    <textarea name="comment" rows="2" placeholder="Details (only visible in popup)..."></textarea>
                </div>
                <div class="form-actions" style="display:flex; align-items:center;">
                    <button type="button" class="icon-btn hidden" id="btn-delete-appt-edit"
                        style="color: var(--danger); margin-right: auto; width:32px; height:32px;" title="Delete ID">
                        <i class="fa-regular fa-trash-can"></i>
                    </button>
                    <button type="button" class="btn-text" onclick="app.ui.closeModals()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Plan</button>
                </div>
            </form>
        </div>

        <!-- Add Store Type Modal -->
        <div id="modal-store" class="modal hidden">
            <h3>New Store Type</h3>
            <form id="form-store">
                <div class="form-group">
                    <label>Store Name/Type</label>
                    <input type="text" name="name" required placeholder="e.g. Hardware">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-text" onclick="app.ui.closeModals()">Cancel</button>
                    <button type="submit" class="btn-primary">Create List</button>
                </div>
            </form>
        </div>

        <!-- Add Grocery Item Modal -->
        <div id="modal-item" class="modal hidden">
            <h3>Add Item</h3>
            <form id="form-item">
                <input type="hidden" name="storeId">
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" name="text" required placeholder="e.g. Milk">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-text" onclick="app.ui.closeModals()">Cancel</button>
                    <button type="submit" class="btn-primary">Add to List</button>
                </div>
            </form>
        </div>

        <!-- Settings Modal -->
        <div id="modal-settings" class="modal hidden">
            <h3>Settings</h3>
            <form id="form-settings">
                <h4>Calendar Preferences</h4>
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Hour</label>
                        <select name="startHour" id="setting-startHour">
                            <!-- Populated by JS -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>End Hour</label>
                        <select name="endHour" id="setting-endHour">
                            <!-- Populated by JS -->
                        </select>
                    </div>
                </div>

                <h4>Sharing (Export/Import)</h4>
                <div class="form-group">
                    <button type="button" class="btn-primary" onclick="app.data.exportData()">Copy Data to
                        Clipboard</button>
                </div>
                <div class="form-group">
                    <textarea id="import-area" placeholder="Paste data here to import..." rows="3"
                        style="width:100%; border-radius:8px; padding:10px;"></textarea>
                    <button type="button" class="btn-primary" style="margin-top:10px;"
                        onclick="app.data.importData()">Import Data</button>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-text" onclick="app.ui.closeModals()">Close</button>
                    <button type="submit" class="btn-primary">Save Settings</button>
                </div>
            </form>
        </div>

        <!-- Login / User Select Modal -->
        <div id="modal-login" class="modal hidden" data-static="true">
            <div class="login-header">
                <i class="fa-solid fa-lock login-icon"></i>
                <h2>Who is this?</h2>
            </div>

            <div id="login-user-list" class="sidebar-list">
                <!-- User list for login -->
            </div>

            <div class="login-actions">
                <button type="button" class="btn-text" onclick="app.ui.openModal('member')">
                    <i class="fa-solid fa-plus"></i> New Family Member
                </button>
            </div>

            <div id="login-pin-container" class="hidden">
                <h4 id="login-selected-user">Enter PIN for User</h4>
                <input type="password" id="login-pin-input" placeholder="****" maxlength="4">
                <div class="form-actions" style="justify-content: center;">
                    <button type="button" class="btn-text" onclick="app.auth.resetLogin()">Back</button>
                    <button type="button" class="btn-primary" onclick="app.auth.submitPin()">Enter</button>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Failed', err));
            });
        }
    </script>
</body>

</html>
